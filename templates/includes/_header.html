<header id="header" class="header sticky-top">
  <div class="branding d-flex align-items-center">
    <div class="container-fluid container-xl position-relative d-flex align-items-center justify-content-between">

      <a href="{% url 'doctor_view' %}" class="logo d-flex align-items-center me-auto">
        <h1 class="sitename">Medilab</h1>
      </a>

      <nav id="navmenu" class="navmenu me-3">
        <ul>
          <li><a href="{% url 'doctor_view' %}" class="active">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#services">Services</a></li>
          <li><a href="#doctors">Doctors</a></li>
          <li><a href="#contact">Contact</a></li>

          {% if user.is_authenticated %}
            <li class="dropdown"><a href="#"><span>{{ user.username }}</span> <i class="bi bi-chevron-down"></i></a>
              <ul>
                <li><a href="{% url 'logout' %}">Logout</a></li>
              </ul>
            </li>
          {% endif %}
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

      <div class="header-buttons d-flex align-items-center">
        {% if not user.is_authenticated %}
          <a class="btn-login me-2" href="{% url 'login' %}" style="color: #1977cc; font-size: 14px; font-weight: 600; text-decoration: none;">Login</a>
          <a class="cta-btn d-none d-md-inline-block me-2" href="{% url 'signup' %}" style="background: #1977cc; color: #fff; padding: 8px 20px; border-radius: 50px; font-size: 14px;">Sign Up</a>
        {% endif %}
        <a class="cta-btn d-none d-lg-inline-block" href="#appointment" style="background: #1977cc; color: #fff; padding: 8px 20px; border-radius: 50px; font-size: 14px;">Make an Appointment</a>
      </div>

    </div>
  </div>
</header>
