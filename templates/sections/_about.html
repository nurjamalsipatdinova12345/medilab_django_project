{% load static %}
<section id="about" class="about section">
  <div class="container">
    <div class="row gy-4 gx-5">

      {% if about %}
      <div class="col-lg-6 position-relative align-self-start" data-aos="fade-up" data-aos-delay="200">
        <img src="{{ about.image.url }}" class="img-fluid" alt="">
        <a href="{{ about.video_url }}" class="glightbox pulsating-play-btn"></a>
      </div>

      <div class="col-lg-6 content" data-aos="fade-up" data-aos-delay="100">
        <h3>{{ about.title }}</h3>
        <p>{{ about.description }}</p>

        <ul>
          <li>
            <i class="fa-solid fa-vial-circle-check"></i>
            <div>
              <h5>{{ about.text1_title }}</h5>
              <p>{{ about.text1_text }}</p>
            </div>
          </li>
          <li>
            <i class="fa-solid fa-pump-medical"></i>
            <div>
              <h5>{{ about.text2_title }}</h5>
              <p>{{ about.text2_text }}</p>
            </div>
          </li>
          <li>
            <i class="fa-solid fa-heart-circle-xmark"></i>
            <div>
              <h5>{{ about.text3_title }}</h5>
              <p>{{ about.text3_text }}</p>
            </div>
          </li>
        </ul>
      </div>
      {% else %}
      <p class="text-center">magliwmat joq</p>
      {% endif %}

    </div>
  </div>
</section>
