{% load static %}
<section id="appointment" class="appointment section">

  <div class="container section-title" data-aos="fade-up">
    <h2>Appointment</h2>
    <p>Doktor korigine jaziliw ushin tomendegi magliwmatlardi toltirin</p>
  </div>

  <div class="container" data-aos="fade-up" data-aos-delay="100">

    <form action="{% url 'appointment_view' %}" method="post" role="form" class="php-email-form">
      {% csrf_token %} <div class="row">
        <div class="col-md-4 form-group">
          <input type="text" name="name" class="form-control" id="name" placeholder="Your Name" required>
        </div>
        <div class="col-md-4 form-group mt-3 mt-md-0">
          <input type="email" class="form-control" name="email" id="email" placeholder="Your Email" required>
        </div>
        <div class="col-md-4 form-group mt-3 mt-md-0">
          <input type="tel" class="form-control" name="phone" id="phone" placeholder="Your Phone" required>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 form-group mt-3">
          <input type="datetime-local" name="date" class="form-control" id="date" required>
        </div>

        <div class="col-md-4 form-group mt-3">
          <select name="department" id="department" class="form-select" required>
            <option value="">Select Department</option>
            {% for dept in departments %}
              <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-4 form-group mt-3">
          <select name="doctor" id="doctor" class="form-select" required>
            <option value="">Select Doctor</option>
            {% for doctor in doctors %}
              <option value="{{ doctor.id }}">{{ doctor.full_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group mt-3">
        <textarea class="form-control" name="message" rows="5" placeholder="Message (Optional)"></textarea>
      </div>

      <div class="mt-3">
        <div class="loading">Loading</div>
        <div class="error-message"></div>
        <div class="sent-message">Your appointment request has been sent successfully. Thank you!</div>
        <div class="text-center"><button type="submit" style="background: #1977cc; border: 0; padding: 10px 35px; color: #fff; border-radius: 50px;">Make an Appointment</button></div>
      </div>
    </form>

  </div>
</section>
