{% load static %}
<section id="testimonials" class="testimonials section">
  <div class="container">
    <div class="row align-items-center">

      <div class="col-lg-5 info" data-aos="fade-up" data-aos-delay="100">
        <h3>Pikirler</h3>
        <p>
          Klientlerdin pikirleri menen tanisin
        </p>
      </div>

      <div class="col-lg-7" data-aos="fade-up" data-aos-delay="200">
        <div class="swiper init-swiper">
          <script type="{% static 'application/json' %}" class="swiper-config">
            {
              "loop": true,
              "speed": 600,
              "autoplay": {
                "delay": 5000
              },
              "slidesPerView": "auto",
              "pagination": {
                "el": ".swiper-pagination",
                "type": "bullets",
                "clickable": true
              }
            }
          </script>

          <div class="swiper-wrapper">

            {% for item in testimonials %}
            <div class="swiper-slide">
              <div class="testimonial-item">
                <div class="d-flex">
                  {% if item.image %}
                  <img src="{{ item.image.url }}" class="testimonial-img flex-shrink-0" alt="{{ item.name }}">
                  {% else %}
                  <img src="{% static 'img/testimonials/testimonials-1.jpg' %}" class="testimonial-img flex-shrink-0" alt="Default image">
                  {% endif %}

                  <div>
                    <h3>{{ item.name }}</h3>
                    <h4>{{ item.job }}</h4>
                    <div class="stars">
                      <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                    </div>
                  </div>
                </div>
                <p>
                  <i class="bi bi-quote quote-icon-left"></i>
                  <span>{{ item.comment }}</span>
                  <i class="bi bi-quote quote-icon-right"></i>
                </p>
              </div>
            </div>{% endfor %}
            </div>
          <div class="swiper-pagination"></div>
        </div>
      </div>

    </div>
  </div>
</section>```
